<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструменты | AmukaB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <style>
        body { background: linear-gradient(135deg, #0a0a1a 0%, #15152a 100%); }
        .tools-header { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, rgba(166,136,255,0.15), rgba(108,208,255,0.15)); border-radius: 50px; margin: 30px 0 50px; }
        .category-tabs { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 40px 0; }
        .category-btn { padding: 12px 30px; border-radius: 50px; background: rgba(30,30,50,0.7); color: #b0b0d0; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .category-btn:hover { border-color: #a688ff; color: #a688ff; transform: translateY(-2px); }
        .category-btn.active { background: #a688ff; color: white; border-color: #a688ff; }
        .search-container { max-width: 600px; margin: 30px auto 50px; position: relative; }
        .search-container i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #8f8faf; font-size: 1.2rem; }
        .search-container input { width: 100%; padding: 18px 20px 18px 55px; background: rgba(20,20,35,0.9); border: 2px solid rgba(255,255,255,0.05); border-radius: 60px; color: white; font-size: 1rem; transition: 0.3s; }
        .search-container input:focus { outline: none; border-color: #a688ff; box-shadow: 0 0 30px rgba(166,136,255,0.3); }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin: 40px 0 80px; }
        .tool-card { background: rgba(30,30,50,0.7); backdrop-filter: blur(10px); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.03); transition: all 0.3s ease; cursor: pointer; }
        .tool-card:hover { transform: translateY(-10px); border-color: #a688ff; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .tool-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #a688ff20, #6cd0ff20); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #a688ff; margin-bottom: 20px; }
        .tool-card h3 { color: white; font-size: 1.5rem; margin-bottom: 10px; }
        .tool-card p { color: #b0b0d0; font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; min-height: 60px; }
        .tool-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .tag { padding: 5px 15px; background: rgba(166,136,255,0.1); border-radius: 50px; font-size: 0.8rem; color: #a688ff; border: 1px solid rgba(166,136,255,0.2); }
        .tag.free { background: rgba(0,200,150,0.1); color: #00c896; border-color: rgba(0,200,150,0.2); }
        .tag.popular { background: rgba(255,200,0,0.1); color: #ffcc00; border-color: rgba(255,200,0,0.2); }
        .tag.russia { background: rgba(255,68,68,0.1); color: #ff4444; border-color: rgba(255,68,68,0.2); }
        .tag.limited { background: rgba(128,128,128,0.1); color: #a0a0a0; border-color: rgba(128,128,128,0.2); }
        .tool-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .rating { color: #ffcc44; font-size: 0.9rem; }
        .rating span { color: #8f8faf; margin-left: 5px; }
        .tool-btn { padding: 10px 25px; background: linear-gradient(135deg, #a688ff, #8a6aff); border-radius: 50px; color: white; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .tool-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(166,136,255,0.4); }
        .results-count { text-align: center; color: #8f8faf; margin: 20px 0 40px; }
        .results-count span { color: #a688ff; font-weight: 600; }
        .back-link { display: inline-flex; align-items: center; gap: 10px; color: #a688ff; text-decoration: none; margin: 30px 0; }
        @media (max-width: 768px) {
            .tools-grid { grid-template-columns: 1fr; }
            .category-tabs { gap: 8px; }
            .category-btn { padding: 8px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-brain"></i></div>
            <div class="logo-text"><h1>AmukaB</h1><p>освоим AI вместе</p></div>
        </div>
        <nav class="nav">
            <a href="index.html">Главная</a>
            <a href="tools.html" class="active">Инструменты</a>
            <a href="prompts.html">Промпты</a>
            <a href="trainer.html">Тренажёр</a>
        </nav>
    </header>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>

    <div class="tools-header">
        <h1 class="section-title">🛠️ <span>Инструменты</span></h1>
        <p style="color: #b0b0d0; max-width: 700px; margin: 20px auto;">Актуальный список нейросетей с учётом доступности в РФ</p>
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
            <span class="tag free" style="font-size: 1rem;">#бесплатно</span>
            <span class="tag russia" style="font-size: 1rem;">#РФ</span>
            <span class="tag limited" style="font-size: 1rem;">#ограничено</span>
        </div>
    </div>

    <div class="category-tabs">
        <button class="category-btn active" data-category="all">Все</button>
        <button class="category-btn" data-category="text">📝 Текст</button>
        <button class="category-btn" data-category="image">🎨 Изображения</button>
        <button class="category-btn" data-category="audio">🎵 Аудио</button>
        <button class="category-btn" data-category="video">🎥 Видео</button>
        <button class="category-btn" data-category="code">💻 Код</button>
        <button class="category-btn" data-category="search">🔍 Поиск</button>
    </div>

    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Найти нейросеть...">
    </div>

    <div class="results-count" id="resultsCount">Найдено <span>31</span> инструментов</div>

    <div class="tools-grid" id="toolsGrid"></div>

    <footer class="footer">
        <div>© 2026 AmukaB • Инструменты с ИИ</div>
        <div class="social-links">
            <a href="#"><i class="fab fa-telegram"></i></a>
            <a href="#"><i class="fab fa-vk"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
        </div>
    </footer>
</div>

<script>
    function sortToolsAlphabetically() {
        const grid = document.getElementById('toolsGrid');
        const cards = Array.from(grid.children);
        cards.sort((a, b) => a.dataset.name.toLowerCase().localeCompare(b.dataset.name.toLowerCase()));
        grid.innerHTML = '';
        cards.forEach(card => grid.appendChild(card));
    }

    function filterTools() {
        const toolCards = document.querySelectorAll('.tool-card');
        const activeCategory = document.querySelector('.category-btn.active').dataset.category;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let visibleCount = 0;
        
        toolCards.forEach(card => {
            const cardCategory = card.dataset.category;
            const cardName = card.dataset.name.toLowerCase();
            const cardDesc = card.dataset.description.toLowerCase();
            const matchesCategory = activeCategory === 'all' || cardCategory === activeCategory;
            const matchesSearch = searchTerm === '' || cardName.includes(searchTerm) || cardDesc.includes(searchTerm);
            
            if (matchesCategory && matchesSearch) {
                card.style.display = 'block';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });
        document.getElementById('resultsCount').innerHTML = `Найдено <span>${visibleCount}</span> инструментов`;
    }

    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            filterTools();
        });
    });
    document.getElementById('searchInput').addEventListener('input', filterTools);

    document.addEventListener('DOMContentLoaded', function() {
        const tools = [
            // 📝 ТЕКСТОВЫЕ
            { category: 'text', name: 'ChatGPT', icon: 'fab fa-openai', desc: 'Популярнейший ИИ-ассистент. В России доступ ограничен.', tags: ['#текст', '#популярно', '#ограничено'], free: false, russia: false, rating: 4.9, url: 'https://chat.openai.com/' },
            { category: 'text', name: 'Claude', icon: 'fas fa-robot', desc: 'ИИ от Anthropic. В России не работает.', tags: ['#текст', '#ограничено'], free: false, russia: false, rating: 4.8, url: 'https://claude.ai/' },
            { category: 'text', name: 'Copy.ai', icon: 'fas fa-copy', desc: 'Генерация маркетинговых текстов. Работает с ограничениями.', tags: ['#текст', '#ограничено'], free: true, russia: false, rating: 4.3, url: 'https://www.copy.ai/' },
            { category: 'text', name: 'DeepSeek', icon: 'fas fa-brain', desc: 'Умный ассистент для текстов, кода и анализа. Работает в РФ.', tags: ['#текст', '#РФ', '#популярно'], free: true, russia: true, rating: 4.9, url: 'https://chat.deepseek.com/' },
            { category: 'text', name: 'Gemini', icon: 'fab fa-google', desc: 'ИИ от Google. В России доступ ограничен.', tags: ['#текст', '#ограничено'], free: true, russia: false, rating: 4.7, url: 'https://gemini.google.com/' },
            { category: 'text', name: 'GigaChat', icon: 'fas fa-university', desc: 'Русскоязычная модель от Сбера. Работает в РФ.', tags: ['#текст', '#РФ'], free: true, russia: true, rating: 4.4, url: 'https://giga.chat/' },
            { category: 'text', name: 'Notion AI', icon: 'fas fa-book', desc: 'ИИ-помощник в Notion. Работает в РФ.', tags: ['#текст', '#РФ'], free: false, russia: true, rating: 4.5, url: 'https://www.notion.so/product/ai' },
            { category: 'text', name: 'Rytr', icon: 'fas fa-pen-fancy', desc: 'Помощник для написания текстов. В России почти не работает.', tags: ['#текст', '#ограничено'], free: false, russia: false, rating: 4.2, url: 'https://rytr.me/' },
            { category: 'text', name: 'Writesonic', icon: 'fas fa-bolt', desc: 'Генерация контента для соцсетей. Работает с ограничениями.', tags: ['#текст', '#ограничено'], free: true, russia: false, rating: 4.3, url: 'https://writesonic.com/' },
            { category: 'text', name: 'YandexGPT', icon: 'fab fa-yandex', desc: 'Нейросеть от Яндекса. Работает в РФ.', tags: ['#текст', '#РФ'], free: true, russia: true, rating: 4.5, url: 'https://ya.ru/' },
            // 🎨 ИЗОБРАЖЕНИЯ
            { category: 'image', name: 'Adobe Firefly', icon: 'fab fa-adobe', desc: 'Генерация изображений через Adobe. В России не работает.', tags: ['#изображения', '#ограничено'], free: false, russia: false, rating: 4.6, url: 'https://www.adobe.com/products/firefly.html' },
            { category: 'image', name: 'FusionBrain', icon: 'fas fa-microchip', desc: 'Платформа от SberDevices. Работает в РФ.', tags: ['#изображения', '#РФ'], free: true, russia: true, rating: 4.1, url: 'https://fusionbrain.ai/' },
            { category: 'image', name: 'Kandinsky 3.0', icon: 'fas fa-palette', desc: 'Нейросеть Сбера для генерации изображений. Работает в РФ.', tags: ['#изображения', '#РФ'], free: true, russia: true, rating: 4.8, url: 'https://www.sberbank.ru/ru/person/kandinsky' },
            { category: 'image', name: 'Leonardo AI', icon: 'fas fa-paint-brush', desc: 'Популярный генератор изображений. Работает в РФ.', tags: ['#изображения', '#РФ'], free: true, russia: true, rating: 4.7, url: 'https://leonardo.ai/' },
            { category: 'image', name: 'Lexica', icon: 'fas fa-search', desc: 'Поиск и генерация изображений. В России не грузит.', tags: ['#изображения', '#ограничено'], free: true, russia: false, rating: 4.4, url: 'https://lexica.art/' },
            { category: 'image', name: 'Photoshop AI', icon: 'fas fa-camera', desc: 'Нейросети в Adobe Photoshop. В России не работает.', tags: ['#изображения', '#ограничено'], free: false, russia: false, rating: 4.7, url: 'https://www.adobe.com/products/photoshop.html' },
            { category: 'image', name: 'Playground AI', icon: 'fas fa-play', desc: 'Платформа для генерации изображений. Работает в РФ.', tags: ['#изображения', '#РФ'], free: true, russia: true, rating: 4.4, url: 'https://playgroundai.com/' },
            { category: 'image', name: 'Shedevrum', icon: 'fab fa-yandex', desc: 'Генерация изображений от Яндекса. Работает в РФ.', tags: ['#изображения', '#РФ'], free: true, russia: true, rating: 4.3, url: 'https://shedevrum.ai/' },
            // 🎵 АУДИО
            { category: 'audio', name: 'AIVA', icon: 'fas fa-music', desc: 'Генерация классической музыки. Доступ ограничен.', tags: ['#аудио', '#ограничено'], free: true, russia: false, rating: 4.5, url: 'https://www.aiva.ai/' },
            { category: 'audio', name: 'ElevenLabs', icon: 'fas fa-microphone', desc: 'Озвучка текста. Доступ ограничен.', tags: ['#аудио', '#ограничено'], free: true, russia: false, rating: 4.9, url: 'https://elevenlabs.io/' },
            { category: 'audio', name: 'Soundraw', icon: 'fas fa-headphones', desc: 'Генерация музыки. Доступ ограничен.', tags: ['#аудио', '#ограничено'], free: true, russia: false, rating: 4.3, url: 'https://soundraw.io/' },
            { category: 'audio', name: 'Suno AI', icon: 'fas fa-music', desc: 'Генерация песен и музыки. Работает в РФ.', tags: ['#аудио', '#РФ'], free: true, russia: true, rating: 4.7, url: 'https://suno.com/' },
            { category: 'audio', name: 'Voicemod', icon: 'fas fa-voice', desc: 'Изменение голоса. Работает в РФ.', tags: ['#аудио', '#РФ'], free: true, russia: true, rating: 4.4, url: 'https://www.voicemod.net/' },
            // 💻 КОД
            { category: 'code', name: 'Codeium', icon: 'fas fa-bolt', desc: 'Бесплатный аналог Copilot. Работает в РФ.', tags: ['#код', '#РФ'], free: true, russia: true, rating: 4.5, url: 'https://codeium.com/' },
            { category: 'code', name: 'GitHub Copilot', icon: 'fab fa-github', desc: 'ИИ-помощник для кода. Доступ ограничен.', tags: ['#код', '#ограничено'], free: false, russia: false, rating: 4.8, url: 'https://github.com/features/copilot' },
            { category: 'code', name: 'Replit AI', icon: 'fas fa-code', desc: 'ИИ-помощник в Replit. Работает в РФ.', tags: ['#код', '#РФ'], free: true, russia: true, rating: 4.3, url: 'https://replit.com/' },
            { category: 'code', name: 'Tabnine', icon: 'fas fa-code', desc: 'Автодополнение кода. Работает в РФ.', tags: ['#код', '#РФ'], free: true, russia: true, rating: 4.3, url: 'https://www.tabnine.com/' },
            // 🎥 ВИДЕО
            { category: 'video', name: 'CapCut', icon: 'fas fa-video', desc: 'Видеоредактор с ИИ. В России может работать нестабильно.', tags: ['#видео', '#ограничено'], free: true, russia: false, rating: 4.5, url: 'https://www.capcut.com/' },
            { category: 'video', name: 'Pika', icon: 'fas fa-film', desc: 'Генерация видео из текста. Доступ ограничен.', tags: ['#видео', '#ограничено'], free: true, russia: false, rating: 4.4, url: 'https://pika.art/' },
            // 🔍 ПОИСК
            { category: 'search', name: 'Perplexity AI', icon: 'fas fa-search', desc: 'Поисковик с ИИ. Доступ ограничен.', tags: ['#поиск', '#ограничено'], free: true, russia: false, rating: 4.7, url: 'https://www.perplexity.ai/' },
            { category: 'search', name: 'You.com', icon: 'fas fa-compass', desc: 'Поиск с ИИ. Доступ ограничен.', tags: ['#поиск', '#ограничено'], free: true, russia: false, rating: 4.2, url: 'https://you.com/' }
        ];

        const grid = document.getElementById('toolsGrid');
        tools.forEach(tool => {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.dataset.category = tool.category;
            card.dataset.name = tool.name;
            card.dataset.description = tool.desc;
            
            // Формируем теги БЕЗ дублирования
            let allTags = [...tool.tags];
            
            if (tool.free && !allTags.includes('#бесплатно')) allTags.push('#бесплатно');
            if (tool.russia && !allTags.includes('#РФ')) allTags.push('#РФ');
            if (tool.rating >= 4.7 && !allTags.includes('#популярно')) allTags.push('#популярно');
            
            let tagsHtml = '';
            allTags.forEach(tag => {
                let tagClass = '';
                if (tag === '#ограничено') tagClass = 'limited';
                else if (tag === '#РФ') tagClass = 'russia';
                else if (tag === '#бесплатно') tagClass = 'free';
                else if (tag === '#популярно') tagClass = 'popular';
                tagsHtml += `<span class="tag ${tagClass}">${tag}</span>`;
            });
            
            const stars = '⭐'.repeat(Math.floor(tool.rating));
            card.innerHTML = `
                <div class="tool-icon"><i class="${tool.icon}"></i></div>
                <h3>${tool.name}</h3>
                <p>${tool.desc}</p>
                <div class="tool-tags">${tagsHtml}</div>
                <div class="tool-footer">
                    <div class="rating">${stars} <span>${tool.rating}</span></div>
                    <a href="${tool.url}" target="_blank" class="tool-btn">Перейти <i class="fas fa-arrow-right"></i></a>
                </div>
            `;
            grid.appendChild(card);
        });
        sortToolsAlphabetically();
        filterTools();
    });
</script>
</body>
</html>
